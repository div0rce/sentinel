# Alembic configuration. The SQLAlchemy URL is supplied at runtime by
# backend/alembic/env.py, which reads it from backend.app.config.Settings, so it is
# intentionally absent here.

[alembic]
# Path to the migration environment, relative to this file (the repo root).
script_location = backend/alembic

# Make the repo root importable so env.py can `from backend.app... import ...`.
prepend_sys_path = .

# Use a sortable, slug-readable filename for revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Migrations are written in UTC.
timezone = UTC

# Where new migration files land.
version_locations = %(here)s/backend/alembic/versions

# We do not need Alembic to import the env module just to render templates.
revision_environment = false

# Logging — keep it terse so `make migrate` output is easy to read.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
